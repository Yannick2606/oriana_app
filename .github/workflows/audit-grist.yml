name: Audit Grist pour PostgreSQL

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/audit-grist.yml
      - backend/scripts/auditGrist.js
      - backend/package.json

permissions:
  contents: read

jobs:
  audit-grist:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GRIST_API_URL: ${{ secrets.GRIST_API_URL }}
      GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
      GRIST_DOC_ID: ${{ secrets.GRIST_DOC_ID }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Inventorier le schéma, les formules et les volumes
        run: npm run audit:grist
      - name: Conserver le rapport technique
        uses: actions/upload-artifact@v4
        with:
          name: audit-grist-postgresql
          path: backend/tmp/grist-audit.json
          retention-days: 30
