name: Captures T30B

on:
  push:
    branches: [t30b-validation-visuelle]
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/capture-t30b.yml
      - frontend/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  captures:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - run: npm install --no-save playwright@1.58.2
      - run: npx playwright install --with-deps chromium
      - run: node scripts/captureT30B.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: captures-t30b
          path: frontend/captures/*.png
          if-no-files-found: error
          retention-days: 7
