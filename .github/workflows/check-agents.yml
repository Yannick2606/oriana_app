name: Vérification agents Grist

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agents-grist:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GRIST_API_URL: ${{ secrets.GRIST_API_URL }}
      GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
      GRIST_DOC_ID: ${{ secrets.GRIST_DOC_ID }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Préparer la boîte aux lettres des agents
        run: npm run prepare:agents
      - name: Vérifier le cycle asynchrone dans Grist
        run: npm run check:agents
