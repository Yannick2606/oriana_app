name: Vérification PostgreSQL

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/check-postgres.yml
      - backend/Dockerfile
      - backend/sql/**
      - backend/scripts/migratePostgres.js
      - backend/src/services/postgres.js
      - backend/src/services/sessionStore.js
      - deploy/docker-compose.yml
      - deploy/backup-postgres.sh
      - deploy/restore-postgres.sh

permissions:
  contents: read

jobs:
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.10-alpine
        env:
          POSTGRES_DB: oriana
          POSTGRES_USER: oriana
          POSTGRES_PASSWORD: test-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oriana -d oriana"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: oriana
      POSTGRES_USER: oriana
      POSTGRES_PASSWORD: test-ci-only
      PGPASSWORD: test-ci-only
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: oriana
      PGUSER: oriana
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Vérifier lint et tests
        run: npm run lint && npm test
      - name: Vérifier l'image de migration
        working-directory: .
        run: |
          docker build -f backend/Dockerfile -t oriana-backend-postgres-check .
          docker run --rm oriana-backend-postgres-check \
            sh -c 'test -r scripts/migratePostgres.js && test -r sql/001-initial-schema.sql'
      - name: Vérifier les migrations et leur idempotence
        run: npm run migrate:postgres && npm run migrate:postgres
      - name: Vérifier le schéma et une restauration
        run: |
          pg_client() {
            docker run --rm --network host -v /tmp:/backup \
              -e PGPASSWORD -e PGPORT -e PGUSER -e PGDATABASE \
              -e PGHOST=127.0.0.1 postgres:17.10-alpine "$@"
          }
          test "$(pg_client psql -Atc 'select count(*) from schema_migrations')" = "1"
          table_count="$(pg_client psql -Atc "select count(*) from information_schema.tables where table_schema = 'public'")"
          test "$table_count" -ge 29
          pg_client pg_dump --format=custom --file=/backup/oriana-ci.dump
          pg_client pg_restore --list /backup/oriana-ci.dump >/dev/null
          pg_client createdb oriana_restore
          pg_client pg_restore --dbname=oriana_restore --no-owner /backup/oriana-ci.dump
          test "$(pg_client psql --dbname=oriana_restore -Atc 'select count(*) from schema_migrations')" = "1"
