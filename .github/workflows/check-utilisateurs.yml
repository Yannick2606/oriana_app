name: Vérification utilisateurs Grist

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  utilisateurs-grist:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GRIST_API_URL: ${{ secrets.GRIST_API_URL }}
      GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
      GRIST_DOC_ID: ${{ secrets.GRIST_DOC_ID }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Installer les dépendances
        run: npm ci
      - name: Sauvegarder et préparer le schéma utilisateurs
        run: |
          GRIST_SCHEMA_BACKUP_PATH=tmp/grist-utilisateurs-schema-before.json npm run prepare:utilisateurs
          GRIST_SCHEMA_BACKUP_PATH=tmp/grist-utilisateurs-schema-after-first-run.json npm run prepare:utilisateurs
      - name: Conserver la sauvegarde de structure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grist-utilisateurs-schema-before
          path: backend/tmp/grist-utilisateurs-schema-*.json
          retention-days: 30
      - name: Vérifier l'administration des utilisateurs
        run: npm run check:utilisateurs
