services:
  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_ORGANIZATION_NAME: ${VITE_ORGANIZATION_NAME}
    container_name: oriana-frontend
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.oriana.rule=Host(`${FRONTEND_HOST}`)
      - traefik.http.routers.oriana.entrypoints=websecure
      - traefik.http.routers.oriana.tls=true
      - traefik.http.routers.oriana.tls.certresolver=mytlschallenge
      - traefik.http.services.oriana.loadbalancer.server.port=8080
    networks:
      - traefik
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: oriana-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.oriana-api.rule=Host(`api.boreal.immo`)
      - traefik.http.routers.oriana-api.entrypoints=websecure
      - traefik.http.routers.oriana-api.tls=true
      - traefik.http.routers.oriana-api.tls.certresolver=mytlschallenge
      - traefik.http.services.oriana-api.loadbalancer.server.port=3000
    networks:
      - traefik
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

networks:
  traefik:
    external: true
    name: root_default
