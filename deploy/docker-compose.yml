services:
  postgres:
    image: postgres:17.10-alpine
    container_name: oriana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_ORGANIZATION_NAME: ${VITE_ORGANIZATION_NAME}
    container_name: oriana-frontend
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.oriana.rule=Host(`${FRONTEND_HOST}`)
      - traefik.http.routers.oriana.entrypoints=websecure
      - traefik.http.routers.oriana.tls=true
      - traefik.http.routers.oriana.tls.certresolver=mytlschallenge
      - traefik.http.services.oriana.loadbalancer.server.port=8080
    networks:
      - traefik
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=0755
      - /var/run:uid=101,gid=101,mode=0755
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: oriana-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=root_default
      - traefik.http.routers.oriana-api.rule=Host(`api.boreal.immo`)
      - traefik.http.routers.oriana-api.entrypoints=websecure
      - traefik.http.routers.oriana-api.tls=true
      - traefik.http.routers.oriana-api.tls.certresolver=mytlschallenge
      - traefik.http.services.oriana-api.loadbalancer.server.port=3000
    networks:
      - traefik
      - database
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  postgres-backup:
    image: postgres:17.10-alpine
    container_name: oriana-postgres-backup
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
      - postgres-backups:/backups
    command: ["sh", "-c", "while true; do /usr/local/bin/backup-postgres.sh; sleep 86400; done"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - database
    security_opt:
      - no-new-privileges:true

networks:
  traefik:
    external: true
    name: root_default
  database:
    internal: true

volumes:
  postgres-data:
  postgres-backups:
